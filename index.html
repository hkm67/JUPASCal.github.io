<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUPAS Cal 2026 — Unofficial Score Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>JUPAS Cal 2026</h1>
        <p>Unofficial Annual Score Calculator for HK DSE Applicants</p>
    </header>

    <div class="main-container">
        <!-- 1. Left Sidebar: Grade Inputs -->
        <section class="sidebar" id="subject-inputs">
            <!-- Populated by JUPAS_UI.renderSubjectInputs() -->
            <p>Loading inputs...</p>
        </section>

        <!-- 2. Middle Column: Programme Explorer -->
        <section class="programme-explorer">
            <input type="text" id="search-input" placeholder="Search by JUPAS Code, Name, or Institution...">
            <div id="programme-list">
                <!-- Populated by JUPAS_UI.updateSearch() -->
            </div>
        </section>

        <!-- 3. Right Panel: Live Results -->
        <section class="content-area" id="result-display">
            <div class="placeholder-msg">
                <p>← Select a programme to see your estimated score and eligibility.</p>
            </div>
        </section>
    </div>

    <!-- Application Logic -->
    <!-- Note: Load order matters. Calculator is pure logic, UI manages the DOM. -->
    <script src="js/calculator.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
